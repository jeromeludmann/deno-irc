# InspIRCd v4 — minimal config for integration testing

<server name="inspircd.test"
        description="InspIRCd Integration Test Server"
        network="TestNet">

<admin name="Test Admin"
       description="Integration Test"
       email="test@inspircd.test">

# --- Modules ---

<module name="cap">
<module name="ircv3">
<module name="ircv3_accounttag">
<module name="ircv3_batch">
<module name="ircv3_capnotify">
<module name="ircv3_chghost">
<module name="ircv3_ctctags">
<module name="ircv3_echomessage">
<module name="ircv3_invitenotify">
<module name="ircv3_labeledresponse">
<module name="ircv3_msgid">
<module name="ircv3_servertime">
<module name="monitor">
<module name="setname">
<module name="ssl_gnutls">
<module name="sslinfo">
<module name="inviteexception">
<module name="banexception">
<module name="namesx">
<module name="uhnames">
<module name="botmode">

# --- TLS ---

<sslprofile name="Clients"
            provider="gnutls"
            certfile="/inspircd/conf/cert.pem"
            keyfile="/inspircd/conf/key.pem"
            hash="sha256"
            priority="NORMAL"
            requestclientcert="no">

# --- Listeners ---

<bind address="" port="6697" type="clients" sslprofile="Clients">
<bind address="" port="6667" type="clients">

# --- Connection classes ---

<connect name="main"
         allow="*"
         timeout="60"
         flood="100"
         fakelag="no"
         localmax="100"
         globalmax="100"
         maxchans="50"
         hardsendq="1M"
         softsendq="512K"
         recvq="64K"
         modes="+x">

# --- Limits ---

<limits maxnick="30"
        maxchan="64"
        maxmodes="20"
        maxreal="128"
        maxaway="200"
        maxkick="255"
        maxtopic="307"
        maxquit="255">

# --- Options ---

<options prefixpart="no"
         suffixpart="no"
         fixedpart=""
         prefixquit="Quit: "
         suffixquit=""
         fixedquit=""
         defaultmodes="ont"
         moronbanner=""
         cyclehostsfromuser="no"
         syntaxhints="yes">

# --- Performance ---

<performance softlimit="1024"
             quietbursts="yes"
             netbuffersize="10240">

# --- Security ---

<security annoithority="no"
          hidebans="no"
          maxtargets="20"
          customversion=""
          genericoper="no"
          userstats="">

# --- Misc ---

<dns timeout="5">
<log target="stdout" method="file" type="*" level="default">
