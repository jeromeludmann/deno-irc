/* UnrealIRCd — minimal config for integration testing */

include "modules.default.conf";
include "operclass.default.conf";

me {
	name "unrealircd.test";
	info "UnrealIRCd Integration Test Server";
	sid "001";
};

admin {
	"Test Admin";
	"admin";
	"test@unrealircd.test";
};

class clients {
	pingfreq 90;
	maxclients 1000;
	sendq 1M;
	recvq 8000;
};

allow {
	ip *@*;
	class clients;
	maxperip 100;
};

listen {
	ip *;
	port 6667;
};

listen {
	ip *;
	port 6697;
	options { tls; };
};

set {
	network-name "TestNet";
	default-server "unrealircd.test";
	help-channel "#help";
	hiddenhost-prefix "Clk";
	prefix-quit "Quit";

	cloak-keys {
		"jVbqr8K2mN5wP7xT3hD6cY9fA4sL0gR";
		"nW3kF7pJ1vC5xH9bQ2mS6dY0tR4aG8e";
		"zL5nB8cX2wK4vJ7hT0gD3fA6sR9mY1qP";
	};

	tls {
		certificate "tls/server.cert.pem";
		key "tls/server.key.pem";
	};

	modes-on-connect "+ix";
	modes-on-join "+nt";
	maxchannelsperuser 50;

	anti-spam-quit-message-time 0;
	kline-address "test@unrealircd.test";

	anti-flood {
		connect-flood 100:1;
		unknown-flood-amount 4096;
		unknown-flood-bantime 0;
	};
};
