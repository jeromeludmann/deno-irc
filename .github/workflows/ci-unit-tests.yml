name: Unit Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  deno:
    name: Deno · coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task coverage
      - name: Check coverage threshold (95%)
        run: |
          deno coverage --exclude="_test.ts" --exclude="/testing/" --lcov --output=coverage/lcov.info coverage/cov_profile
          COVERAGE=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{printf "%.1f", (lh/lf)*100}' coverage/lcov.info)
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 95" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the 95% threshold"
            exit 1
          fi

  node:
    name: Node.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run test:node

  bun:
    name: Bun
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test core/*_test.ts plugins/*_test.ts runtime/bun_test.ts
