name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/ci-checks.yml

  unit:
    name: Unit Tests
    needs: [checks]
    uses: ./.github/workflows/ci-unit-tests.yml

  integration:
    name: Integration Tests
    needs: [unit]
    uses: ./.github/workflows/ci-integration-tests.yml
