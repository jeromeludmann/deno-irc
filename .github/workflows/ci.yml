name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-deno:
    name: Unit tests · Deno
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task lint
      - run: deno fmt --check
      - run: deno task test

  test-node:
    name: Unit tests · Node.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck:node
      - run: npm run test:node

  test-bun:
    name: Unit tests · Bun
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck:bun
      - run: bun test core/*_test.ts plugins/*_test.ts runtime/bun_test.ts

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-deno]

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task coverage
      - name: Check coverage threshold (95%)
        run: |
          COVERAGE=$(deno coverage --exclude="_test.ts" --exclude="/testing/" coverage/cov_profile 2>&1 | grep "All files" | sed 's/\x1b\[[0-9;]*m//g' | awk -F'|' '{gsub(/ /,"",$5); print $5}')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 95" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the 95% threshold"
            exit 1
          fi

  integration-deno:
    name: Integration · Deno · ${{ matrix.ircd }}
    runs-on: ubuntu-latest
    needs: [test-deno, test-node, test-bun]

    strategy:
      matrix:
        ircd: [ergo, inspircd, unrealircd]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task test:integration:${{ matrix.ircd }}

  integration-node:
    name: Integration · Node.js · ergo
    runs-on: ubuntu-latest
    needs: [test-deno, test-node, test-bun]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run test:node:integration:ergo

  integration-bun:
    name: Integration · Bun · ergo
    runs-on: ubuntu-latest
    needs: [test-deno, test-node, test-bun]

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: |
          docker compose -f integration/ergo/docker-compose.yml down -v 2>/dev/null
          docker compose -f integration/ergo/docker-compose.yml up -d --force-recreate
          sleep 2
          IRCD=ergo bun test --timeout 30000 integration/integration_test.ts
          docker compose -f integration/ergo/docker-compose.yml down -v
