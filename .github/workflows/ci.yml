name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
      fail-fast: true

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint sources
        if: matrix.os == 'ubuntu-latest'
        run: deno task lint

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: deno fmt --check

      - name: Run tests
        run: deno task test
