name: release-gh

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        type: string
        default: ''

jobs:
  create:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0)
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          FEATS=$(git log "$RANGE" --pretty=format:"%s (%h)" --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log "$RANGE" --pretty=format:"%s (%h)" --grep="^fix" 2>/dev/null || true)
          OTHERS=$(git log "$RANGE" --pretty=format:"%s (%h)" --invert-grep --grep="^fix" --grep="^feat" --grep="^chore: release" 2>/dev/null || true)

          {
            echo "body<<CHANGELOG_EOF"

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS" | sed 's/^/- /'
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
